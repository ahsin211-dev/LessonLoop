name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  etl-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: etl-api/package-lock.json

      - name: Install dependencies
        working-directory: etl-api
        run: npm ci

      - name: Run unit tests
        working-directory: etl-api
        run: npm test

  website-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build frontend
        working-directory: website
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:3001/local
